<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打工人生存指南 - 原型预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .phone-frame {
            width: 430px;
            height: 932px;
            background: #000;
            border-radius: 60px;
            padding: 12px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 50px;
            overflow: hidden;
        }
        .notch {
            width: 200px;
            height: 30px;
            background: #000;
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .iframe-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">打工人生存指南 - 原型预览</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 首页预览 -->
            <div class="phone-frame">
                <div class="notch"></div>
                <div class="phone-screen">
                    <div class="iframe-container">
                        <iframe src="pages/home.html" title="首页"></iframe>
                    </div>
                </div>
            </div>

            <!-- 工作状态页预览 -->
            <div class="phone-frame">
                <div class="notch"></div>
                <div class="phone-screen">
                    <div class="iframe-container">
                        <iframe src="pages/work.html" title="工作状态"></iframe>
                    </div>
                </div>
            </div>

            <!-- 分享页预览 -->
            <div class="phone-frame">
                <div class="notch"></div>
                <div class="phone-screen">
                    <div class="iframe-container">
                        <iframe src="pages/share.html" title="分享"></iframe>
                    </div>
                </div>
            </div>

            <!-- 个人中心预览 -->
            <div class="phone-frame">
                <div class="notch"></div>
                <div class="phone-screen">
                    <div class="iframe-container">
                        <iframe src="pages/profile.html" title="个人中心"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面说明 -->
        <div class="mt-8 bg-white rounded-lg p-6 shadow-lg">
            <h2 class="text-xl font-semibold mb-4">页面说明</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="p-4 bg-gray-50 rounded-lg">
                    <h3 class="font-medium mb-2">首页 (home.html)</h3>
                    <p class="text-gray-600">展示打工状态、在线人数统计和快捷操作入口</p>
                </div>
                <div class="p-4 bg-gray-50 rounded-lg">
                    <h3 class="font-medium mb-2">工作状态 (work.html)</h3>
                    <p class="text-gray-600">显示当前工作状态、时长统计和成就系统</p>
                </div>
                <div class="p-4 bg-gray-50 rounded-lg">
                    <h3 class="font-medium mb-2">分享 (share.html)</h3>
                    <p class="text-gray-600">图片生成和分享功能，支持自定义文案和背景</p>
                </div>
                <div class="p-4 bg-gray-50 rounded-lg">
                    <h3 class="font-medium mb-2">个人中心 (profile.html)</h3>
                    <p class="text-gray-600">用户信息、设置和统计数据展示</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
