<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作 - 打工人日记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 17px;
            font-weight: 600;
        }
        .status-icons {
            display: flex;
            gap: 8px;
        }
        .status-icon {
            width: 18px;
            height: 18px;
            background-color: #000;
            opacity: 0.8;
            border-radius: 2px;
        }
        .tab-bar {
            height: 80px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #f0f0f0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 11px;
        }
        .tab-item.active {
            color: #007AFF;
        }
        .tab-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .timer-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        .timer-circle::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .timer-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .mario-icon {
            position: absolute;
            width: 40px;
            height: 40px;
            top: 20px;
            right: 20px;
            transform: rotate(15deg);
        }
    </style>
</head>
<body class="bg-white text-gray-900">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="time">9:41</div>
        <div class="status-icons">
            <span class="status-icon"></span>
            <span class="status-icon"></span>
            <span class="status-icon"></span>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="px-5 pt-4 pb-20">
        <h1 class="text-2xl font-bold mb-8">工作计时</h1>

        <!-- 计时器 -->
        <div class="flex flex-col items-center mb-8">
            <div class="timer-circle">
                <div class="timer-content">
                    <p class="text-4xl font-bold mb-1">05:23:41</p>
                    <p class="text-gray-500 text-sm">今日工作时间</p>
                </div>
            </div>
         
        </div>

        <!-- 控制按钮 -->
        <div class="flex justify-center space-x-4 mb-10">
            <button class="bg-blue-500 text-white py-3 px-8 rounded-full font-medium">
                开始工作
            </button>
            <button class="bg-gray-200 text-gray-800 py-3 px-8 rounded-full font-medium">
                休息一下
            </button>
        </div>

        <!-- 今日统计 -->
        <h2 class="text-lg font-semibold mb-3">今日统计</h2>
        <div class="bg-white border border-gray-100 rounded-xl p-5 shadow-sm mb-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="text-center">
                    <p class="text-gray-500 text-xs mb-1">专注次数</p>
                    <p class="text-xl font-bold">8</p>
                </div>
                <div class="text-center">
                    <p class="text-gray-500 text-xs mb-1">休息次数</p>
                    <p class="text-xl font-bold">4</p>
                </div>
                <div class="text-center">
                    <p class="text-gray-500 text-xs mb-1">最长专注</p>
                    <p class="text-xl font-bold">1h 45m</p>
                </div>
            </div>
        </div>

        <!-- 本周趋势 -->
        <h2 class="text-lg font-semibold mb-3">本周趋势</h2>
        <div class="bg-white border border-gray-100 rounded-xl p-5 shadow-sm">
            <div class="h-20 flex items-end justify-between px-2">
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-100 rounded-t-md" style="height: 30%"></div>
                    <p class="text-xs text-gray-500 mt-1">一</p>
                </div>
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-300 rounded-t-md" style="height: 60%"></div>
                    <p class="text-xs text-gray-500 mt-1">二</p>
                </div>
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-400 rounded-t-md" style="height: 80%"></div>
                    <p class="text-xs text-gray-500 mt-1">三</p>
                </div>
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-500 rounded-t-md" style="height: 75%"></div>
                    <p class="text-xs text-gray-500 mt-1">四</p>
                </div>
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-400 rounded-t-md" style="height: 65%"></div>
                    <p class="text-xs text-gray-500 mt-1">五</p>
                </div>
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-200 rounded-t-md" style="height: 40%"></div>
                    <p class="text-xs text-gray-500 mt-1">六</p>
                </div>
                <div class="h-full flex flex-col items-center justify-end">
                    <div class="w-8 bg-blue-100 rounded-t-md" style="height: 20%"></div>
                    <p class="text-xs text-gray-500 mt-1">日</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="tab-bar">
        <div class="tab-item">
            <i class="fas fa-home tab-icon"></i>
            <span>首页</span>
        </div>
        <div class="tab-item active">
            <i class="fas fa-briefcase tab-icon"></i>
            <span>工作</span>
        </div>
        <div class="tab-item">
            <i class="fas fa-user tab-icon"></i>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
