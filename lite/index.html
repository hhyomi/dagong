<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打工人日记 - 轻量版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .device-frame {
            width: 375px;
            border-radius: 40px;
            background: #f0f0f0;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .device-screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }
        .notch {
            width: 150px;
            height: 20px;
            background: #000;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 10;
        }
        .device-container {
            width: 100%;
            height: 700px;
            background: #fff;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">打工人日记 - 简约版</h1>
            <p class="text-gray-600">专注于核心功能，简洁的设计风格</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 justify-items-center">
            <!-- 首页预览 -->
            <div>
                <div class="device-frame">
                    <div class="device-screen">
                        <div class="notch"></div>
                        <div class="device-container">
                            <iframe src="pages/home.html" title="首页"></iframe>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <h2 class="text-xl font-semibold text-gray-800">首页</h2>
                    <p class="text-gray-600 mt-1">工作状态概览</p>
                </div>
            </div>
            
            <!-- 工作页预览 -->
            <div>
                <div class="device-frame">
                    <div class="device-screen">
                        <div class="notch"></div>
                        <div class="device-container">
                            <iframe src="pages/work.html" title="工作"></iframe>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <h2 class="text-xl font-semibold text-gray-800">工作</h2>
                    <p class="text-gray-600 mt-1">专注工作与休息</p>
                </div>
            </div>
            
            <!-- 商城预览 -->
            <div>
                <div class="device-frame">
                    <div class="device-screen">
                        <div class="notch"></div>
                        <div class="device-container">
                            <iframe src="pages/shop.html" title="商城"></iframe>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <h2 class="text-xl font-semibold text-gray-800">商城</h2>
                    <p class="text-gray-600 mt-1">虚拟物品与调休券</p>
                </div>
            </div>
            
            <!-- 个人中心预览 -->
            <div>
                <div class="device-frame">
                    <div class="device-screen">
                        <div class="notch"></div>
                        <div class="device-container">
                            <iframe src="pages/profile.html" title="个人中心"></iframe>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <h2 class="text-xl font-semibold text-gray-800">个人中心</h2>
                    <p class="text-gray-600 mt-1">简约的个人信息</p>
                </div>
            </div>
        </div>
        
        <!-- 设计说明 -->
        <div class="mt-16 bg-white rounded-2xl p-8 shadow-sm max-w-3xl mx-auto">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">设计理念</h2>
            <p class="text-gray-700 mb-4">本设计遵循极简主义，用最少的视觉元素传达核心信息，减少用户干扰，提高使用效率。同时保留趣味性的马里奥元素，让工作记录更有乐趣。</p>
            
            <h3 class="text-xl font-semibold text-gray-800 mt-6 mb-2">核心特点</h3>
            <ul class="list-disc list-inside text-gray-700 space-y-2">
                <li>简约清晰的界面设计，减少认知负担</li>
                <li>减少不必要的功能选项，专注于核心使用场景</li>
                <li>保留马里奥风格的趣味视觉元素</li>
                <li>符合iOS设计规范的交互体验</li>
                <li>新增虚拟调休券，满足打工人的心理需求</li>
            </ul>
        </div>
    </div>
</body>
</html>
